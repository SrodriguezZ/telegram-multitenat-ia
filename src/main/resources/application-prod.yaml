spring:
  datasource:
    url: ${TELEGRAM_IA_DATASOURCE_URL}
    username: ${TELEGRAM_IA_DATASOURCE_USERNAME}
    password: ${TELEGRAM_IA_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

telegram-link:
  token:
    pepper: ${TELEGRAM_LINK_TOKEN_PEPPER}
  current-user:
    company-user-id: ${TELEGRAM_LINK_CURRENT_USER_COMPANY_USER_ID}
    company-id: ${TELEGRAM_LINK_CURRENT_USER_COMPANY_ID}
    role: ${TELEGRAM_LINK_CURRENT_USER_ROLE}
    status: ${TELEGRAM_LINK_CURRENT_USER_STATUS}
