name: CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-and-publish:
    name: Build, test, and publish image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}
      tag: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test with Maven
        run: ./mvnw --batch-mode clean verify

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --pull \
            --tag "${{ steps.image.outputs.name }}:latest" \
            --tag "${{ steps.image.outputs.name }}:${{ github.sha }}" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ steps.image.outputs.name }}:latest"
          docker push "${{ steps.image.outputs.name }}:${{ github.sha }}"

  deploy-to-vps:
    name: Deploy to VPS
    needs: build-test-and-publish
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' &&
      secrets.DEPLOY_HOST != '' &&
      secrets.DEPLOY_USER != '' &&
      secrets.DEPLOY_SSH_KEY != '' &&
      secrets.DEPLOY_PATH != '' &&
      secrets.GHCR_USER != '' &&
      secrets.GHCR_PAT != ''
    env:
      APP_TAG: ${{ needs.build-test-and-publish.outputs.tag }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          timeout: 120s
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            COMPOSE_FILE="${APP_DIR}/docker-compose.example.yml"

            cd "$APP_DIR"
            [ -f "$COMPOSE_FILE" ] || (echo "Missing $COMPOSE_FILE in VPS app directory" && exit 1)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            GHCR_OWNER="${GHCR_OWNER:-${{ github.repository_owner }}}"
            export GHCR_OWNER="${GHCR_OWNER,,}"
            GHCR_REPOSITORY="${GHCR_REPOSITORY:-${{ github.event.repository.name }}}"
            export GHCR_REPOSITORY="${GHCR_REPOSITORY,,}"
            export IMAGE_TAG="${APP_TAG}"

            # Keep compose file in the VPS repo and copy variables in .env before first run
            [ -f ./.env ] || (echo 'Missing .env in VPS app directory' && exit 1)

            # Update and refresh the backend container.
            docker compose -f "$COMPOSE_FILE" pull backend
            docker compose -f "$COMPOSE_FILE" up -d backend

            # Optional clean-up
            docker image prune -f
