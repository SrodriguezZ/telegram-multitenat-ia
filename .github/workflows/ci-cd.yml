name: CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-and-publish:
    name: Build, test, and publish image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}
      tag: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Package application without tests
        run: ./mvnw --batch-mode clean package -DskipTests

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --pull \
            --tag "${{ steps.image.outputs.name }}:latest" \
            --tag "${{ steps.image.outputs.name }}:${{ github.sha }}" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ steps.image.outputs.name }}:latest"
          docker push "${{ steps.image.outputs.name }}:${{ github.sha }}"
